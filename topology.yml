name: sample-windows-range
hosts:
  - name: windows1
    base_box:
      image: windows-10-x86_64
    flavor: m1.large
  - name: windows2
    base_box:
      image: windows-10-x86_64
    flavor: m1.large
  - name: windows3
    base_box:
      image: windows-10-x86_64
    flavor: m1.large
  - name: windows4
    base_box:
      image: windows-10-x86_64
    flavor: m1.large
routers:
  - name: router
    base_box:
      image: debian-12-x86_64
    mgmt_user: debian
    mgmt_protocol: ssh
    flavor: standard.small
wan:
  name: internet-connection
  cidr: 100.100.100.0/24
networks:
  - name: windowsnet
    cidr: 10.0.0.0/24
net_mappings:
  - host: windows1
    network: windowsnet
    ip: 10.0.0.10
  - host: windows2
    network: windowsnet
    ip: 10.0.0.11
  - host: windows3
    network: windowsnet
    ip: 10.0.0.12
  - host: windows4
    network: windowsnet
    ip: 10.0.0.13
router_mappings:
  - router: router
    network: windowsnet
    ip: 10.0.0.1
groups: []